[io] 
outdir: "auto"     # dir name; auto->make it based on conf params
prefix: "MSP_sclf2_solveE_gap2_" # prefix for the dir name
postfix: "_v29"     # postfix for the dir name
interval: 1000       # output frequency in units of simulation steps for analysis files
plot_interval: 1000 # QED restart freq

full_interval: -1  #output frequency to write full simulation snapshots
restart: 10000    #frequency to write restart files (these overwrite previous files)
laprestart: 0 #-1     #restart switch (-1 no restart; 0 automatic; X lap to restart)

stride: 1          #output reduce factor for fields;  NxMesh/stride must be int
stride_mom: 1      #output reduce factor for moments; NxMesh/stride must be int

mpi_task_mode: False # rank0 is empty if true


#-------------------------------------------------- 
#simulation parameters
[simulation]
cfl: 0.45      #time step in units of CFL
Nt: 500000     #maximum steps
npasses: 8    #number of current filter passes #Try 4!

qed_mode: True # QED interactions on/off
qed_step: 1    # perform QED interactions at every this many steps

qed_mode_rp = False  # Select radio pulsar interactions and settings
qed_mode_msp = True  # Select millisecond pulsar interactions and settings

#-------------------------------------------------- 
[problem]

me: -1.0           #electron mass-to-charge
mi: +1836.0        #ion mass-to-charge

chi:    0.0      # magnetic obliquity angle
bratio: 1e-3 #0.1 #1e-5   # nonlinearity of B field; B/B_QED
vrot:   0.03 #0.1         # surface rotation velocity at the Rpc

Nmp:    1e8  # number of electrons/positrons in a macroparticle

delgam:  0.3     # temperature
delgam_x: 1e-3   # photon blackbody temperature in mc^2
temp_ratio: 1.0  # T_i/T_e



ninj_pairs:     2.0 #0.1 #0.003 # kappa in pair injection coefficient in star
ninj_min_pairs: 0.0 #0.1 #0.0   # minpair inj rate per dt per cell #Try 0!

ninj_phots:     500 #1500 # photon injection coefficient in star
ninj_min_phots: 500 #1500 # minphoton inj rate per dt per cell
wph: 100        # weight of the injected photons

delta_left: 10
delta_right: 0.1

jm_scaling = 1.5  #constant current scaling

rad_curv: 4    # curvature radius in units of polar cap radius
rad_pcap: 0.8

#max_tile_prtcl_num: 100 # max prtcl num in tile (in units of multiplicity)
#max_tile_phot_num: 100 # max photon num in tile (in units of multiplicity)

#--------------------------------------------------
#spatial grid parameters 
[grid]
Nx:     1024
Ny:     1
Nz:     1
NxMesh: 20
NyMesh: 1 
NzMesh: 1 

[particles]
Nspecies: 4  # number of species (typically 2); here e^-, e^+, x, p^+
ppc: 16       # particle per cell per species
xpc: 16       # photons per cell

n_test_prtcls: 100000   # number of tracer particles

#--------------------------------------------------#
# QED configurations
lum_ep:  0.0  # electron injection luminosity
lum_ph1: 0.0  # fixed synchrotorn seed photon supply
lum_ph2: 0.0  # disk photon supply


#--------------------------------------------------
# NOTE: unused parameters
[vmesh]
Nvx: 1
Nvy: 1
Nvz: 1

dx: 1.0 
dy: 1.0
dz: 1.0
